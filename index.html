<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rádios de Portugal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #060606;
            --bg-soft: #101010;
            --bg-card: #141414;
            --bg-card-2: #1a1a1a;
            --line: #2a2a2a;
            --line-strong: #3a3a3a;
            --text: #f4f4f4;
            --muted: #aaaaaa;
            --accent: #ff9900;
            --accent-2: #ffb84d;
            --danger: #ff5c5c;
            --success: #3dff75;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
            background: radial-gradient(circle at top, rgba(255,153,0,0.06), transparent 30%),
                        linear-gradient(180deg, #050505 0%, #0a0a0a 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6,6,6,0.94);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--line);
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--accent);
            margin: 0;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--line);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
            background: linear-gradient(180deg, #181818, #0f0f0f);
            color: var(--accent);
        }

        .header-btn:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            background: linear-gradient(180deg, #242424, #141414);
        }

        .compact-toggle-btn, .sleep-btn, .sync-btn {
            width: auto;
            padding: 0 12px;
            gap: 6px;
            font-size: 14px;
        }

        .compact-toggle-btn {
            background: linear-gradient(180deg, #1a2a1a, #0f1a0f);
            color: var(--success);
            border-color: rgba(61,255,117,0.3);
        }

        .sleep-btn {
            background: linear-gradient(180deg, #2a1a2a, #1a0f1a);
            color: #c084fc;
            border-color: rgba(192,132,252,0.3);
        }

        .sync-btn {
            background: linear-gradient(180deg, #1a2a3a, #0f1a2a);
            color: #60a5fa;
            border-color: rgba(96,165,250,0.3);
        }

        .sleep-active {
            background: linear-gradient(180deg, #7e22ce, #5b0e91);
            color: white;
            border-color: #c084fc;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .clear-btn {
            color: var(--danger);
            border-color: rgba(255,92,92,0.35);
        }

        .clear-btn:hover {
            color: #fff;
            background: linear-gradient(180deg, #4a1515, #2e0c0c);
            border-color: var(--danger);
        }

        .radio-list {
            list-style: none;
            margin-top: 6px;
        }

        .radio-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, var(--bg-card), var(--bg-card-2));
            border: 1px solid var(--line);
            border-radius: 14px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .radio-item:hover {
            border-color: #4a4a4a;
            background: linear-gradient(180deg, #1a1a1a, #1e1e1e);
        }

        .radio-item.playing {
            background: linear-gradient(180deg, #142214, #0f1a0f);
            border-color: rgba(61,255,117,0.6);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3), 0 0 0 1px rgba(61,255,117,0.15) inset;
        }

        .compact-mode .radio-link {
            display: none;
        }

        .compact-mode .radio-item {
            padding: 8px 12px;
        }

        .compact-mode .radio-name {
            font-size: 14px;
        }

        .compact-mode .radio-name-row {
            margin-bottom: 0;
        }

        .radio-main {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .fav-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid #5a4a1a;
            background: #17130a;
            color: #8a7a3a;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            font-size: 16px;
            font-weight: bold;
        }

        .fav-btn:hover {
            border-color: #d8a73a;
            color: #f5c04f;
            transform: scale(1.02);
        }

        .fav-btn.active {
            background: linear-gradient(180deg, #3a2a08, #241a05);
            color: #ffd966;
            border-color: #ffcc4d;
        }

        .radio-info {
            flex: 1;
            min-width: 0;
        }

        .radio-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .radio-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }

        .favorite-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 20px;
            background: rgba(255,204,77,0.12);
            color: #ffd15c;
            border: 1px solid rgba(255,204,77,0.4);
            text-transform: uppercase;
        }

        .playing-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 20px;
            background: rgba(61,255,117,0.12);
            color: var(--success);
            border: 1px solid rgba(61,255,117,0.5);
            text-transform: uppercase;
        }

        .radio-link {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            word-break: break-all;
            letter-spacing: 0.2px;
            opacity: 0.85;
        }

        .radio-link:hover {
            opacity: 1;
            text-decoration: none;
        }

        .radio-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .play-btn {
            width: 38px;
            height: 38px;
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: transparent;
            color: var(--success);
        }

        .play-btn:hover {
            transform: translateY(-1px);
            border-color: var(--success);
            background: rgba(61,255,117,0.1);
        }

        .play-btn.playing {
            color: var(--danger);
            border-color: var(--danger);
        }

        .play-btn.playing:hover {
            background: rgba(255,92,92,0.1);
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--line-strong);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #171717;
        }

        .edit-btn {
            color: var(--accent);
            border-color: rgba(255,153,0,0.4);
        }

        .edit-btn:hover {
            color: #000;
            background: var(--accent);
            border-color: var(--accent);
        }

        .delete-btn {
            color: var(--danger);
            border-color: rgba(255,92,92,0.4);
        }

        .delete-btn:hover {
            color: #000;
            background: var(--danger);
            border-color: var(--danger);
        }

        .file-input {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(180deg, #0c0c0c, #141414);
            padding: 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(255,153,0,0.4);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }

        .modal-content h2 {
            color: var(--accent);
            margin-bottom: 18px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #1b1b1b;
            border: 1px solid rgba(255,153,0,0.4);
            color: #fff;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: #222;
            box-shadow: 0 0 0 2px rgba(255,153,0,0.15);
        }

        .gist-preview {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            color: #60a5fa;
            text-align: center;
        }

        .timer-info {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
            border: 1px solid rgba(192,132,252,0.3);
        }

        .timer-countdown {
            font-size: 24px;
            font-weight: 700;
            font-family: monospace;
            color: #c084fc;
        }

        .cancel-timer-btn {
            margin-top: 10px;
            background: #2d1b3d;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #c084fc;
            cursor: pointer;
            font-size: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .save-btn, .confirm-btn, .cancel-btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .save-btn {
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            color: #000;
        }

        .save-btn:hover {
            transform: translateY(-1px);
        }

        .confirm-btn {
            background: linear-gradient(180deg, #9b59b6, #7e3d9f);
            color: #fff;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .confirm-btn:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .cancel-btn {
            background: #222;
            color: #fff;
            border: 1px solid #3a3a3a;
        }

        .cancel-btn:hover {
            background: #2e2e2e;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #6a6a6a;
            font-size: 10px;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: #9a9a9a;
            background: linear-gradient(180deg, #111, #151515);
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            font-size: 14px;
        }

        audio {
            display: none;
        }

        @media (max-width: 700px) {
            .header {
                padding: 10px 14px;
            }
            .container {
                padding: 10px 14px 20px;
            }
            .radio-item {
                padding: 8px 12px;
                gap: 8px;
            }
            .radio-actions {
                gap: 5px;
            }
            .play-btn, .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .radio-name {
                font-size: 14px;
            }
            .header-btn {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .compact-toggle-btn, .sleep-btn, .sync-btn {
                width: auto;
                padding: 0 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📻 RÁDIOS DE PORTUGAL</h1>
        </div>
        <div class="header-buttons">
            <button class="header-btn compact-toggle-btn" id="compactToggleBtn" onclick="toggleCompactMode()">📐</button>
            <button class="header-btn sleep-btn" id="sleepTimerBtn" onclick="openSleepModal()">⏰</button>
            <button class="header-btn sync-btn" id="syncGistBtn" onclick="openGistModal()">☁️</button>
            <button class="header-btn clear-btn" onclick="clearAllRadios()" title="Limpar todas">🗑️</button>
            <button class="header-btn export-btn" onclick="exportRadios()" title="Exportar JSON">⬇️</button>
            <button class="header-btn import-btn" onclick="openImportModal()" title="Importar JSON">📂</button>
            <button class="header-btn add-btn" onclick="openAddModal()" title="Adicionar rádio">+</button>
        </div>
    </div>

    <div class="container" id="appContainer">
        <ul class="radio-list" id="radioList"></ul>
        <div class="footer">
            <p>⭐ favorito | ▶️ play/stop | ✏️ editar | 🗑️ apagar | 📐 compacto | ⏰ timer | ☁️ sync</p>
        </div>
    </div>

    <!-- Modal Gist Sync -->
    <div class="modal" id="gistModal">
        <div class="modal-content">
            <h2>☁️ GIST</h2>
            <div class="form-group">
                <label>TOKEN (guardado localmente)</label>
                <input type="password" id="gistTokenInput" placeholder="GitHub token (para guardar)">
                <div class="gist-preview">🔑 Token persistente após refresh. Necessário para escrever.</div>
            </div>
            <div class="form-group">
                <label>GIST ID</label>
                <input type="text" id="gistIdInput" placeholder="ex: abc123def456">
            </div>
            <div class="form-group">
                <label>NOME DO FICHEIRO</label>
                <input type="text" id="gistFilenameInput" placeholder="radios.json" value="radios.json">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="loadFromGist()">📥 CARREGAR</button>
                <button class="confirm-btn" onclick="saveToGist()">📤 GUARDAR</button>
                <button class="cancel-btn" onclick="closeGistModal()">CANC</button>
            </div>
        </div>
    </div>

    <!-- Modal Sleep Timer -->
    <div class="modal" id="sleepModal">
        <div class="modal-content">
            <h2>⏰ TIMER</h2>
            <div class="form-group">
                <label>Parar após:</label>
                <select id="sleepMinutesSelect">
                    <option value="5">5 min</option>
                    <option value="10">10 min</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60">60 min</option>
                    <option value="90">90 min</option>
                    <option value="120">120 min</option>
                </select>
            </div>
            <div id="sleepTimerStatus" class="timer-info" style="display: none;"></div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="startSleepTimer()">INICIAR</button>
                <button class="cancel-btn" onclick="closeSleepModal()">CANC</button>
            </div>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>➕ NOVA</h2>
            <div class="form-group">
                <label>NOME</label>
                <input type="text" id="radioName" placeholder="Ex: Rádio Comercial">
            </div>
            <div class="form-group">
                <label>STREAM</label>
                <input type="url" id="radioUrl" placeholder="https://...">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="addRadio()">SALVAR</button>
                <button class="cancel-btn" onclick="closeAddModal()">CANC</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ EDITAR</h2>
            <div class="form-group">
                <label>NOME</label>
                <input type="text" id="editRadioName">
            </div>
            <div class="form-group">
                <label>STREAM</label>
                <input type="url" id="editRadioUrl">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveEditRadio()">ATUAL</button>
                <button class="cancel-btn" onclick="closeEditModal()">CANC</button>
            </div>
        </div>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <h2>📂 IMPORTAR</h2>
            <div class="file-info" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📄</span>
                <span class="text">Selecionar JSON</span>
                <div class="filename" id="selectedFilename"></div>
            </div>
            <input type="file" id="fileInput" class="file-input" accept=".json,application/json">
            <p class="warning-text">⚠️ Substitui lista atual.</p>
            <div class="modal-buttons">
                <button class="confirm-btn" id="importConfirmBtn" onclick="importFromFile()" disabled>IMPORT</button>
                <button class="cancel-btn" onclick="closeImportModal()">CANC</button>
            </div>
        </div>
    </div>

    <audio id="globalAudio" preload="none"></audio>

    <script>
        const STORAGE_KEY = 'radiosPortugal';
        const COMPACT_MODE_KEY = 'compactMode';
        const SLEEP_TIMER_KEY = 'sleepTimerEnd';
        const GIST_ID_KEY = 'gistId';
        const GIST_FILENAME_KEY = 'gistFilename';
        const GIST_TOKEN_KEY = 'gistToken';
        
        const defaultRadios = [
            { id: generateId(), nome: "TSF", stream: "https://directo.tsf.pt/tsfdirecto.mp3", favorito: true },
            { id: generateId(), nome: "Antena 3", stream: "https://radiocast.rtp.pt/antena380a.mp3", favorito: false },
            { id: generateId(), nome: "RFM", stream: "https://playerservices.streamtheworld.com/api/livestream-redirect/RFM_SC", favorito: false },
            { id: generateId(), nome: "M80", stream: "https://stream-icy.bauermedia.pt/m80.mp3", favorito: false }
        ];

        let radios = [];
        let currentPlaying = null;
        let editIndex = null;
        let importedBuffer = null;
        let compactMode = false;
        let sleepTimerInterval = null;
        let sleepTimerEndTime = null;

        const radioListEl = document.getElementById('radioList');
        const addModal = document.getElementById('addModal');
        const editModal = document.getElementById('editModal');
        const importModal = document.getElementById('importModal');
        const sleepModal = document.getElementById('sleepModal');
        const gistModal = document.getElementById('gistModal');
        const globalAudio = document.getElementById('globalAudio');
        const importConfirmBtn = document.getElementById('importConfirmBtn');
        const selectedFilenameSpan = document.getElementById('selectedFilename');
        const fileInputEl = document.getElementById('fileInput');
        const appContainer = document.getElementById('appContainer');

        function generateId() {
            return 'r_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
        }

        function normalizeRadio(radio) {
            if (!radio || typeof radio !== 'object') return null;
            let nome = radio.nome ? String(radio.nome).trim() : '';
            let stream = radio.stream ? String(radio.stream).trim() : '';
            if (!nome || !stream) return null;
            if (!/^https?:\/\//i.test(stream)) return null;
            return {
                id: radio.id || generateId(),
                nome: nome,
                stream: stream,
                favorito: Boolean(radio.favorito)
            };
        }

        function saveRadios() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(radios));
        }

        function sortFavsToTop() {
            const playingId = (currentPlaying !== null && radios[currentPlaying]) ? radios[currentPlaying].id : null;
            const favs = radios.filter(r => r.favorito);
            const norm = radios.filter(r => !r.favorito);
            radios = [...favs, ...norm];
            if (playingId) currentPlaying = radios.findIndex(r => r.id === playingId);
            if (currentPlaying !== -1 && !radios[currentPlaying]) currentPlaying = null;
        }

        function loadCompactMode() {
            const saved = localStorage.getItem(COMPACT_MODE_KEY);
            compactMode = saved === 'true';
            applyCompactMode();
        }

        function applyCompactMode() {
            if (compactMode) {
                appContainer.classList.add('compact-mode');
                document.getElementById('compactToggleBtn').innerHTML = '📖';
            } else {
                appContainer.classList.remove('compact-mode');
                document.getElementById('compactToggleBtn').innerHTML = '📐';
            }
            localStorage.setItem(COMPACT_MODE_KEY, compactMode);
        }

        function toggleCompactMode() {
            compactMode = !compactMode;
            applyCompactMode();
        }

        function stopSleepTimer() {
            if (sleepTimerInterval) { clearInterval(sleepTimerInterval); sleepTimerInterval = null; }
            localStorage.removeItem(SLEEP_TIMER_KEY);
            sleepTimerEndTime = null;
            const btn = document.getElementById('sleepTimerBtn');
            btn.classList.remove('sleep-active');
            btn.innerHTML = '⏰';
        }

        function updateSleepButtonUI(active) {
            const btn = document.getElementById('sleepTimerBtn');
            if (active) { btn.classList.add('sleep-active'); btn.innerHTML = '⏰'; }
            else { btn.classList.remove('sleep-active'); btn.innerHTML = '⏰'; }
        }

        function startSleepTimerFromMinutes(minutes) {
            stopSleepTimer();
            const endTime = Date.now() + (minutes * 60 * 1000);
            sleepTimerEndTime = endTime;
            localStorage.setItem(SLEEP_TIMER_KEY, endTime.toString());
            sleepTimerInterval = setInterval(() => {
                if (!sleepTimerEndTime) { stopSleepTimer(); return; }
                const remaining = sleepTimerEndTime - Date.now();
                if (remaining <= 0) {
                    if (currentPlaying !== null) { globalAudio.pause(); currentPlaying = null; renderRadios(); }
                    stopSleepTimer();
                    alert('⏰ Timer: reprodução interrompida.');
                } else {
                    updateSleepButtonUI(true);
                }
            }, 1000);
            updateSleepButtonUI(true);
        }

        function checkSavedSleepTimer() {
            const savedEnd = localStorage.getItem(SLEEP_TIMER_KEY);
            if (savedEnd) { const end = parseInt(savedEnd, 10); if (!isNaN(end) && end > Date.now()) { sleepTimerEndTime = end; const remaining = end - Date.now(); const minutesRemaining = Math.ceil(remaining / 60000); startSleepTimerFromMinutes(minutesRemaining); } else localStorage.removeItem(SLEEP_TIMER_KEY); }
        }

        function openSleepModal() { sleepModal.classList.add('show'); const statusDiv = document.getElementById('sleepTimerStatus'); if (sleepTimerEndTime && sleepTimerEndTime > Date.now()) { const remaining = sleepTimerEndTime - Date.now(); const mins = Math.floor(remaining / 60000); const secs = Math.floor((remaining % 60000) / 1000); statusDiv.style.display = 'block'; statusDiv.innerHTML = `<div>⏳ Ativo</div><div class="timer-countdown">${mins}:${secs.toString().padStart(2,'0')}</div><button class="cancel-timer-btn" onclick="cancelSleepTimerAndClose()">Cancelar</button>`; } else statusDiv.style.display = 'none'; }
        function cancelSleepTimerAndClose() { stopSleepTimer(); closeSleepModal(); renderRadios(); }
        function startSleepTimer() { const select = document.getElementById('sleepMinutesSelect'); const minutes = parseInt(select.value, 10); if (isNaN(minutes) || minutes <= 0) return; startSleepTimerFromMinutes(minutes); closeSleepModal(); }
        function closeSleepModal() { sleepModal.classList.remove('show'); }

        // Gist Sync com token persistente
        function openGistModal() {
            const savedGist = localStorage.getItem(GIST_ID_KEY);
            const savedFilename = localStorage.getItem(GIST_FILENAME_KEY);
            const savedToken = localStorage.getItem(GIST_TOKEN_KEY);
            
            if (savedGist) document.getElementById('gistIdInput').value = savedGist;
            if (savedFilename) document.getElementById('gistFilenameInput').value = savedFilename;
            else document.getElementById('gistFilenameInput').value = 'radios.json';
            if (savedToken) document.getElementById('gistTokenInput').value = savedToken;
            
            gistModal.classList.add('show');
        }
        
        function closeGistModal() { gistModal.classList.remove('show'); }

        async function loadFromGist() {
            const gistId = document.getElementById('gistIdInput').value.trim();
            const filename = document.getElementById('gistFilenameInput').value.trim() || 'radios.json';
            if (!gistId) { alert('Gist ID necessário.'); return; }
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`);
                if (!response.ok) throw new Error('Gist não encontrado');
                const gist = await response.json();
                const file = gist.files[filename];
                if (!file) throw new Error(`Ficheiro "${filename}" não encontrado no Gist`);
                const data = JSON.parse(file.content);
                if (!Array.isArray(data)) throw new Error('Formato inválido');
                const cleaned = data.map(normalizeRadio).filter(Boolean);
                if (!cleaned.length) throw new Error('Nenhuma rádio válida');
                if (currentPlaying !== null) { globalAudio.pause(); currentPlaying = null; }
                radios = cleaned;
                sortFavsToTop();
                saveRadios();
                localStorage.setItem(GIST_ID_KEY, gistId);
                localStorage.setItem(GIST_FILENAME_KEY, filename);
                renderRadios();
                alert('✅ Sincronizado!');
                closeGistModal();
            } catch (err) { alert('Erro: ' + err.message); }
        }

        async function saveToGist() {
            const gistId = document.getElementById('gistIdInput').value.trim();
            const token = document.getElementById('gistTokenInput').value.trim();
            const filename = document.getElementById('gistFilenameInput').value.trim() || 'radios.json';
            
            if (!gistId) { alert('Gist ID necessário.'); return; }
            if (!token) { alert('Token necessário para escrever.'); return; }
            
            // Guardar token no localStorage
            localStorage.setItem(GIST_TOKEN_KEY, token);
            localStorage.setItem(GIST_ID_KEY, gistId);
            localStorage.setItem(GIST_FILENAME_KEY, filename);
            
            const content = JSON.stringify(radios, null, 2);
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { [filename]: { content: content } } })
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Erro ao guardar');
                }
                alert('✅ Guardado no Gist!');
                closeGistModal();
            } catch (err) { alert('Erro: ' + err.message); }
        }

        function loadRadios() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved !== null) {
                try { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) { const cleaned = parsed.map(normalizeRadio).filter(Boolean); if (cleaned.length) radios = cleaned; else radios = [...defaultRadios]; } else radios = [...defaultRadios]; } catch(e) { radios = [...defaultRadios]; }
            } else { radios = [...defaultRadios]; }
            if (radios.length === 0) radios = [...defaultRadios];
            sortFavsToTop();
            saveRadios();
            renderRadios();
        }

        function renderRadios() {
            if (!radios.length) { radioListEl.innerHTML = `<li class="empty-state">📡 Nenhuma estação. Clique "+" para adicionar.</li>`; return; }
            radioListEl.innerHTML = '';
            radios.forEach((radio, idx) => {
                const li = document.createElement('li');
                li.className = 'radio-item';
                if (currentPlaying === idx) li.classList.add('playing');
                const shortLink = radio.stream.length > 58 ? radio.stream.slice(0, 55) + '...' : radio.stream;
                li.innerHTML = `
                    <div class="radio-main">
                        <button class="fav-btn ${radio.favorito ? 'active' : ''}" onclick="toggleFavorite(${idx})">${radio.favorito ? '★' : '☆'}</button>
                        <div class="radio-info">
                            <div class="radio-name-row">
                                <div class="radio-name">${escapeHtml(radio.nome)}</div>
                                ${radio.favorito ? '<span class="favorite-badge">FAV</span>' : ''}
                                ${currentPlaying === idx ? '<span class="playing-badge">▶</span>' : ''}
                            </div>
                            <div class="radio-link">${escapeHtml(shortLink)}</div>
                        </div>
                    </div>
                    <div class="radio-actions">
                        <button class="play-btn ${currentPlaying === idx ? 'playing' : ''}" onclick="toggleRadio(${idx})">${currentPlaying === idx ? '⏹️' : '▶️'}</button>
                        <button class="icon-btn edit-btn" onclick="openEditModal(${idx})">✏️</button>
                        <button class="icon-btn delete-btn" onclick="deleteRadio(${idx})">🗑️</button>
                    </div>
                `;
                radioListEl.appendChild(li);
            });
        }

        function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        function toggleFavorite(index) { if (!radios[index]) return; radios[index].favorito = !radios[index].favorito; sortFavsToTop(); saveRadios(); renderRadios(); }
        function toggleRadio(index) { if (!radios[index]) return; const radio = radios[index]; if (currentPlaying === index) { globalAudio.pause(); currentPlaying = null; renderRadios(); } else { if (currentPlaying !== null) globalAudio.pause(); currentPlaying = index; renderRadios(); globalAudio.src = radio.stream; globalAudio.load(); globalAudio.play().catch(err => { alert(`Erro: ${radio.nome}`); currentPlaying = null; renderRadios(); }); } }
        function deleteRadio(index) { if (!radios[index]) return; if (confirm(`Apagar "${radios[index].nome}"?`)) { if (currentPlaying === index) { globalAudio.pause(); currentPlaying = null; } radios.splice(index, 1); if (currentPlaying !== null && currentPlaying > index) currentPlaying--; else if (currentPlaying !== null && currentPlaying >= radios.length) currentPlaying = null; saveRadios(); renderRadios(); } }
        function openAddModal() { addModal.classList.add('show'); document.getElementById('radioName').value = ''; document.getElementById('radioUrl').value = ''; }
        function closeAddModal() { addModal.classList.remove('show'); }
        function addRadio() { const nome = document.getElementById('radioName').value.trim(); const stream = document.getElementById('radioUrl').value.trim(); if (!nome || !stream) { alert('Preencha ambos.'); return; } if (!/^https?:\/\//i.test(stream)) { alert('URL inválido'); return; } radios.push({ id: generateId(), nome, stream, favorito: false }); sortFavsToTop(); saveRadios(); renderRadios(); closeAddModal(); }
        function openEditModal(index) { if(!radios[index]) return; editIndex = index; document.getElementById('editRadioName').value = radios[index].nome; document.getElementById('editRadioUrl').value = radios[index].stream; editModal.classList.add('show'); }
        function closeEditModal() { editModal.classList.remove('show'); editIndex = null; }
        function saveEditRadio() { if (editIndex === null || !radios[editIndex]) { closeEditModal(); return; } const nome = document.getElementById('editRadioName').value.trim(); const stream = document.getElementById('editRadioUrl').value.trim(); if (!nome || !stream) { alert('Preencha ambos.'); return; } if (!/^https?:\/\//i.test(stream)) { alert('Stream inválido'); return; } const wasPlaying = (currentPlaying === editIndex); radios[editIndex].nome = nome; radios[editIndex].stream = stream; if (wasPlaying) { globalAudio.pause(); globalAudio.src = stream; globalAudio.load(); globalAudio.play().catch(() => { currentPlaying = null; renderRadios(); }); } sortFavsToTop(); saveRadios(); renderRadios(); closeEditModal(); }
        function exportRadios() { if(!radios.length) { alert('Lista vazia.'); return; } const dataStr = JSON.stringify(radios, null, 2); const blob = new Blob([dataStr], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `radios_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(url); }
        function openImportModal() { importModal.classList.add('show'); selectedFilenameSpan.textContent = ''; importConfirmBtn.disabled = true; fileInputEl.value = ''; importedBuffer = null; }
        function closeImportModal() { importModal.classList.remove('show'); }
        fileInputEl.addEventListener('change', function(e) { const file = e.target.files[0]; if (!file) { importedBuffer = null; importConfirmBtn.disabled = true; selectedFilenameSpan.textContent = ''; return; } selectedFilenameSpan.textContent = file.name; const reader = new FileReader(); reader.onload = function(ev) { try { const parsed = JSON.parse(ev.target.result); if (!Array.isArray(parsed)) throw new Error('Formato inválido'); const cleaned = parsed.map(normalizeRadio).filter(Boolean); if (!cleaned.length) throw new Error('Nenhuma rádio válida'); importedBuffer = cleaned; importConfirmBtn.disabled = false; } catch(err) { alert('Erro: ' + err.message); selectedFilenameSpan.textContent = '❌ Inválido'; importedBuffer = null; importConfirmBtn.disabled = true; } }; reader.readAsText(file); });
        function importFromFile() { if (!importedBuffer) return; if (currentPlaying !== null) { globalAudio.pause(); currentPlaying = null; } radios = importedBuffer.slice(); sortFavsToTop(); saveRadios(); renderRadios(); closeImportModal(); importedBuffer = null; importConfirmBtn.disabled = true; }
        function clearAllRadios() { if (confirm('⚠️ APAGAR TODAS?')) { if (currentPlaying !== null) globalAudio.pause(); currentPlaying = null; radios = []; saveRadios(); renderRadios(); } }

        addModal.addEventListener('click', (e) => { if(e.target === addModal) closeAddModal(); });
        editModal.addEventListener('click', (e) => { if(e.target === editModal) closeEditModal(); });
        importModal.addEventListener('click', (e) => { if(e.target === importModal) closeImportModal(); });
        sleepModal.addEventListener('click', (e) => { if(e.target === sleepModal) closeSleepModal(); });
        gistModal.addEventListener('click', (e) => { if(e.target === gistModal) closeGistModal(); });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') { closeAddModal(); closeEditModal(); closeImportModal(); closeSleepModal(); closeGistModal(); } });
        globalAudio.addEventListener('error', () => { if(currentPlaying !== null) { alert('Erro no stream.'); currentPlaying = null; renderRadios(); } });
        globalAudio.addEventListener('ended', () => { currentPlaying = null; renderRadios(); });

        loadCompactMode();
        loadRadios();
        checkSavedSleepTimer();

        window.toggleCompactMode = toggleCompactMode;
        window.openSleepModal = openSleepModal; window.startSleepTimer = startSleepTimer; window.closeSleepModal = closeSleepModal; window.cancelSleepTimerAndClose = cancelSleepTimerAndClose;
        window.openGistModal = openGistModal; window.closeGistModal = closeGistModal; window.loadFromGist = loadFromGist; window.saveToGist = saveToGist;
        window.openAddModal = openAddModal; window.closeAddModal = closeAddModal; window.addRadio = addRadio;
        window.openEditModal = openEditModal; window.closeEditModal = closeEditModal; window.saveEditRadio = saveEditRadio;
        window.deleteRadio = deleteRadio; window.exportRadios = exportRadios; window.openImportModal = openImportModal;
        window.closeImportModal = closeImportModal; window.importFromFile = importFromFile; window.clearAllRadios = clearAllRadios;
        window.toggleRadio = toggleRadio; window.toggleFavorite = toggleFavorite;
    </script>
</body>
</html>
